name: 🚀 Android Production Build & Deploy

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    name: Build & Deploy to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Install dependencies
        run: npm install

      - name: ⚡ Install EAS CLI
        run: npm install --global eas-cli

      - name: 🔐 Authenticate with Expo
        run: eas whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🏗 Build Android App (AAB)
        run: eas build --platform android --profile prod --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 🚀 Submit to Google Play Store
        run: eas submit --platform android --profile prod --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
